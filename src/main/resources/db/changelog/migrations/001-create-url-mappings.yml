databaseChangeLog:
  - changeSet:
      id: 1
      author: kmateyev
      changes:
        - createTable:
            tableName: url_mappings
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: original_url
                  type: VARCHAR(2048)
                  constraints:
                    nullable: false
              - column:
                  name: short_code
                  type: VARCHAR(10)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: click_count
                  type: BIGINT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false